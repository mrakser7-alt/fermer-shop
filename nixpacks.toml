[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.intl",
  "php84Extensions.zip",
  "php84Extensions.pdo",
  "php84Extensions.pdo_sqlite",
  "php84Extensions.sqlite3",
  "php84Extensions.mbstring",
  "php84Extensions.xml",
  "php84Extensions.curl",
  "php84Extensions.bcmath",
  "php84Packages.composer",
  "nodejs_20"
]

[phases.build]
cmds = [
  "composer install --optimize-autoloader --no-dev --no-interaction --ignore-platform-reqs",
  "npm ci",
  "npm run build"
]

[start]
cmd = "bash start.sh"
